name: CI/CD — Test & Deploy

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest --ignore=tests/test_integration.py -v --tb=short

  integration-linux:
    name: Run Linux integration test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --dev

      - name: Run integration test
        run: uv run pytest tests/test_integration.py -v --tb=short

  integration-windows:
    name: Run Windows integration test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --dev

      - name: Run integration test
        run: uv run pytest tests/test_integration.py -v --tb=short

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test, integration-linux, integration-windows]
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on main branch
        run: |
          TAG_NAME=${{ github.ref_name }}
          git fetch origin main
          if git merge-base --is-ancestor "$TAG_NAME" origin/main; then
            echo "Tag $TAG_NAME is directly reachable from main branch."
          elif git merge-base --is-ancestor "$TAG_NAME~1" origin/main; then
            echo "Tag $TAG_NAME's parent is reachable from main branch (version bump commit)."
          else
            echo "Error: Tag $TAG_NAME is NOT reachable from main branch. Aborting release."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
