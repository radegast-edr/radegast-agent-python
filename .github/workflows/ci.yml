name: CI — Tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - main

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
